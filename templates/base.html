{% load static %}


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="view-transition" content="same-origin" />
    <link rel="icon" type="image/x-icon" href="{% static 'images/Favicon.ico' %}" />
    <!-- Load critical settings immediately to prevent flash -->
    <script src="{% static 'js/init-critical.js' %}"></script>
        <!-- Bootstrap CSS - preload to avoid render blocking -->
    <link
      rel="preload"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      as="style"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <!-- Fallback for no JS -->
    <noscript
      ><link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    /></noscript>
    <!-- Bootstrap Icons - preload -->
    <link
      rel="preload"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      as="style"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript
      ><link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    /></noscript>
    <title>{% block meta_title %}Title{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>

  <body>
    {% include 'navbar.html' %}
    {% include 'sidebar.html' %}

    <!-- Mobile Menu Button -->
    <button
      class="mobile-menu-btn"
      data-bs-toggle="offcanvas"
      data-bs-target="#sidebar"
      aria-label="Open menu"
    >
      <i class="bi bi-chevron-left"></i>
    </button>

<!-- Main Content -->
    <main>
      <div class="page-content">
        <!-- header component -->
        <div class="container">
            <header class="d-flex justify-content-between align-items-center mb-4">
                <h1>{% block page_title %}Title{% endblock %}</h1>
                {% block header_contents %}
                    <!-- Default content (or leave empty) -->
                {% endblock header_contents %}
            </header>
        </div>
        <hr class="header-line" />

        <div class="container main-content">
            <div class="d-flex flex-column gap-3 align-items-start">
                <div class="col-3 d-flex align-items-center gap-2">
                    {% block content %}
                        <!-- Your page content goes here -->
                    {% endblock %}
                </div>
            </div>
        </div>
    </main>

    <footer>
      <div class="text-center py-3">
        &copy; 2025 6X Labs. All rights reserved.
      </div>
    </footer>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
      defer
    ></script>

    <script src="{% static 'js/theme-toggle.js' %}" defer></script>
    <script src="{% static 'js/tooltip-init.js' %}" defer></script>
  </body>
</html>
