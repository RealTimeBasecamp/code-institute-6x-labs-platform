{# State manager component: Undo, Redo, Save Draft, Discard Changes, Publish buttons #}

<div class="d-flex flex-wrap align-items-center gap-2">
    <button class="btn btn-secondary btn-square" title="Undo">
        <i class="bi bi-arrow-counterclockwise"></i>
    </button>
    <button class="btn btn-secondary btn-square" title="Redo">
        <i class="bi bi-arrow-clockwise"></i>
    </button>
    <button class="btn btn-secondary">
        <i class="bi bi-floppy"></i> Save Draft
    </button>
    <button class="btn btn-secondary">
        <i class="bi bi-x-lg"></i> Discard Changes
    </button>
    <button class="btn btn-primary">
        <i class="bi bi-upload"></i> Publish
    </button>
</div>
