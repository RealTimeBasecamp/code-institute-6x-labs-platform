{% load static %}

<!-- MapLibre GL JS -->
<link
  href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css"
  rel="stylesheet"
/>

<!-- Component CSS -->
<link rel="stylesheet" href="{% static 'planting/css/interactive-map.css' %}" />

<!-- Map Container with Sidebar -->
<div class="interactive-map-flex">
    <!-- Base MapLibre Map with 3D -->
    <div id="map"></div>

    <!-- ECharts Overlay Layer -->
    <div id="echarts-layer"></div>
</div>

<!-- Component JS -->
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>

<!-- Apache ECharts -->
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>

<!-- ECharts GL for 3D charts -->
<script src="https://cdn.jsdelivr.net/npm/echarts-gl@2.0.9/dist/echarts-gl.min.js"></script>

{# Expose page globals before loading the interactive-map script so it
   can read them synchronously on init. This prevents a race where the map
   initializes before these variables are defined. #}

<script src="{% static 'planting/js/interactive-map.js' %}"></script>
