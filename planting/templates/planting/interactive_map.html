{% load static %}

<!-- MapLibre GL JS -->
<link
  href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css"
  rel="stylesheet"
/>

<!-- Component CSS -->
<link rel="stylesheet" href="{% static 'planting/css/interactive-map.css' %}" />

<!-- Map Container -->
<div class="map-container">
  <!-- Base MapLibre Map with 3D -->
  <div id="map"></div>

  <!-- ECharts Overlay Layer -->
  <div id="echarts-layer"></div>

  <!-- Info Panel -->
  <div class="info-panel">
    <h3>Project name</h3>
    <p>Location info [hide this box]</p>
  </div>
</div>

<!-- Component JS -->
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>

<!-- Apache ECharts -->
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>

<!-- ECharts GL for 3D charts -->
<script src="https://cdn.jsdelivr.net/npm/echarts-gl@2.0.9/dist/echarts-gl.min.js"></script>

<script src="{% static 'planting/js/interactive-map.js' %}"></script>
